<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>コーチ管理 — Athletic Club</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Oswald:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c14;--sur:#11141f;--sur2:#181c2a;--sur3:#1e2338;
  --bd:#1e2235;--bd2:#272f4a;
  --or:#ff6b35;--cy:#00e5ff;--lm:#b8ff3c;--pu:#9b59ff;
  --gd:#ffd93d;--rd:#ff4757;--tl:#1dd1a1;
  --tx:#e8eaf6;--tx2:#7b85a8;--tx3:#3a4060;
  --r:14px;--rs:8px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 80% 20%,rgba(255,107,53,.06),transparent 60%);}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,12,20,.95);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);
  padding:calc(var(--st)+12px) 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.htitle{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:.1em;color:var(--or);text-transform:uppercase;}
.htitle span{color:var(--tx2);font-weight:400;font-size:.82rem;}
.hlinks{display:flex;gap:6px;}
.hlink{background:var(--sur2);border:1px solid var(--bd2);color:var(--tx2);
  padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:500;text-decoration:none;transition:all .2s;}
.hlink:hover{color:var(--or);border-color:var(--or);}

.tbar{display:flex;background:var(--sur);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;}
.tbar::-webkit-scrollbar{display:none;}
.tbtn{flex:1;min-width:80px;padding:12px 6px;background:none;border:none;color:var(--tx3);
  font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;
  white-space:nowrap;position:relative;}
.tbtn.active{color:var(--or);}
.tbtn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;
  background:var(--or);border-radius:2px 2px 0 0;box-shadow:0 0 8px var(--or);}

.main{padding:20px;max-width:760px;margin:0 auto;}
.pnl{display:none;}.pnl.active{display:block;}
.stitle{font-family:'Oswald',sans-serif;font-size:.73rem;font-weight:500;letter-spacing:.12em;
  text-transform:uppercase;color:var(--tx3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.card{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:16px;margin-bottom:14px;}

/* TIME ZONE BADGES */
.tz-prep{color:#ff6b35;background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.3);padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700;}
.tz-act{color:var(--gd);background:rgba(255,209,61,.1);border:1px solid rgba(255,209,61,.25);padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700;}
.tz-rem{color:var(--cy);background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700;}

/* FORM */
.lbl{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:5px;}
.inp,.sel{width:100%;padding:10px 12px;background:var(--sur2);border:1px solid var(--bd2);
  border-radius:var(--rs);color:var(--tx);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s;}
.inp:focus,.sel:focus{border-color:var(--or);box-shadow:0 0 0 2px rgba(255,107,53,.1);}
.inp::placeholder{color:var(--tx3);}.sel{appearance:none;cursor:pointer;}
.fsec{margin-bottom:12px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:10px 18px;border:none;border-radius:var(--rs);font-family:inherit;
  font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.bpr{background:var(--or);color:#fff;box-shadow:0 0 16px rgba(255,107,53,.25);}
.bpr:hover{background:#ff8555;}
.bgh{background:var(--sur2);border:1px solid var(--bd2);color:var(--tx2);}
.bgh:hover{border-color:var(--or);color:var(--or);}
.bdng{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);color:var(--rd);}
.bfl{width:100%;}.bsm{padding:6px 12px;font-size:.75rem;}

/* COACH CARDS */
.coach-card{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.coach-avtr{width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--or),var(--rd));
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;}
.coach-nm{font-weight:700;font-size:.92rem;}
.coach-furi{font-size:.72rem;color:var(--tx3);}
.coach-del{margin-left:auto;padding:5px 10px;background:rgba(255,71,87,.1);
  border:1px solid rgba(255,71,87,.25);border-radius:6px;color:var(--rd);
  font-family:inherit;font-size:.72rem;cursor:pointer;flex-shrink:0;}

/* ATTENDANCE RECORD */
.act-date-label{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--tx2);
  margin-bottom:14px;padding:8px 12px;background:var(--sur2);border-radius:var(--rs);
  display:inline-block;}

.att-row{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);
  padding:14px 16px;margin-bottom:10px;}
.att-coach-name{font-weight:700;font-size:.92rem;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;}
.att-times{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.att-time-lbl{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px;}
.att-time-val{font-family:'DM Mono',monospace;font-size:1rem;font-weight:700;color:var(--or);}
.att-zone{margin-top:4px;}

/* TIME ZONE INDICATOR */
.zone-bar{height:6px;border-radius:3px;margin-top:8px;
  background:linear-gradient(to right,
    rgba(255,107,53,.7) 0%, rgba(255,107,53,.7) 55%,
    rgba(255,209,61,.5) 55%, rgba(255,209,61,.5) 80%,
    rgba(0,229,255,.5) 80%, rgba(0,229,255,.5) 100%);
  position:relative;}
.zone-marker{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;
  background:var(--or);border:2px solid var(--bg);transform:translateX(-50%);transition:left .3s;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-c{background:var(--sur2);border-radius:var(--rs);padding:12px;text-align:center;}
.stat-v{font-family:'DM Mono',monospace;font-size:1rem;font-weight:700;}
.stat-v.or{color:var(--or);}.stat-v.lm{color:var(--lm);}.stat-v.cy{color:var(--cy);}
.stat-v.gd{color:var(--gd);}.stat-v.tl{color:var(--tl);}
.stat-l{font-size:.6rem;color:var(--tx3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}

/* HISTORY TABLE */
.htbl-wrap{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.htbl{width:100%;border-collapse:collapse;}
.htbl th{padding:9px 12px;font-size:.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--tx3);background:var(--sur2);
  border-bottom:1px solid var(--bd);text-align:left;}
.htbl td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:.82rem;}
.htbl tr:last-child td{border-bottom:none;}
.htbl tr:hover td{background:rgba(255,107,53,.03);}
.td-time{font-family:'DM Mono',monospace;font-weight:600;}
.td-full{color:var(--tl);font-size:.72rem;}
.td-early{color:var(--or);font-size:.72rem;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb)+24px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--or);color:#fff;padding:11px 22px;border-radius:20px;
  font-size:.85rem;font-weight:700;opacity:0;transition:all .3s;z-index:1000;
  white-space:nowrap;pointer-events:none;box-shadow:0 0 20px rgba(255,107,53,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.ld{text-align:center;padding:32px;color:var(--tx3);font-size:.85rem;}
.spin{width:28px;height:28px;border:2px solid var(--bd2);border-top-color:var(--or);
  border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}

@media(min-width:768px){
  .hdr{padding:16px 32px;}.main{padding:28px 32px;}
  .stats-grid{grid-template-columns:repeat(5,1fr);}
}

/* ── AUTH OVERLAY ── */
#authOverlay{
  position:fixed;inset:0;background:#070810;z-index:9999;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-box{
  background:#0d0f1c;border:1px solid #252b42;border-radius:16px;
  padding:32px 24px;width:100%;max-width:360px;text-align:center;
}
.auth-logo{font-size:2rem;margin-bottom:8px;}
.auth-title{font-size:1.1rem;font-weight:700;color:#e8eaf6;margin-bottom:4px;}
.auth-sub{font-size:.78rem;color:#7b85a8;margin-bottom:24px;}
.auth-input{
  width:100%;padding:12px;background:#141728;border:1px solid #252b42;
  border-radius:10px;color:#e8eaf6;font-family:inherit;font-size:1.1rem;
  text-align:center;letter-spacing:.2em;outline:none;margin-bottom:12px;
  transition:border-color .2s;
}
.auth-input:focus{border-color:#00e5ff;}
.auth-btn{
  width:100%;padding:12px;background:#00e5ff;color:#070810;border:none;
  border-radius:10px;font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.auth-btn:hover{background:#33eeff;}
.auth-err{color:#ff4757;font-size:.8rem;margin-top:8px;display:none;}

</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo">🔐</div>
    <div class="auth-title">Athletic Club</div>
    <div class="auth-sub">管理者パスワードを入力してください</div>
    <input class="auth-input" type="password" id="authInput" 
      placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">ログイン</button>
    <div class="auth-err" id="authErr">パスワードが違います</div>
  </div>
</div>

<header class="hdr">
  <div class="htitle">🏃 コーチ管理 <span>Athletic Club</span></div>
  <div class="hlinks">
    <a href="index.html" class="hlink">🏠 HOME</a>
    <a href="attendance.html" class="hlink">⚡ 出席</a>
    <a href="accounting.html" class="hlink">💴 会計</a>
  </div>
</header>
<div class="tbar">
  <button class="tbtn active" onclick="sw('record',this)">⏱ 出退記録</button>
  <button class="tbtn" onclick="sw('stats',this)">📊 統計</button>
  <button class="tbtn" onclick="sw('coaches',this)">👥 コーチ登録</button>
</div>
<div class="main">

<!-- ── 出退記録 ── -->
<div id="pnl-record" class="pnl active">
  <div class="stitle">活動日・コーチ選択</div>
  <div class="card">
    <div class="frow" style="margin-bottom:12px;">
      <div class="fsec" style="margin:0;">
        <label class="lbl">活動日</label>
        <input class="inp" type="date" id="actDate">
      </div>
      <div class="fsec" style="margin:0;">
        <label class="lbl">コーチ選択</label>
        <select class="sel" id="coachSel" onchange="onCoachSelect()">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 時間入力 -->
  <div id="timeInputArea" style="display:none;">
    <div class="stitle">出退時刻入力</div>
    <div class="card">
      <div class="att-coach-name" id="selCoachName">—</div>

      <!-- 時間帯説明 -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
        <span class="tz-prep">🔴 準備 12:00〜13:20</span>
        <span class="tz-act">🟡 活動 13:30〜15:00</span>
        <span class="tz-rem">🔵 撤去 15:00〜15:30</span>
      </div>

      <div class="frow" style="margin-bottom:14px;">
        <div>
          <label class="lbl">到着時刻</label>
          <select class="sel" id="arrivalSel" onchange="updateZone()">
            <option value="">選択</option>
          </select>
          <div id="arrZone" style="margin-top:6px;"></div>
        </div>
        <div>
          <label class="lbl">退館時刻</label>
          <select class="sel" id="departureSel" onchange="updateZone()">
            <option value="">選択（任意）</option>
          </select>
          <div id="depZone" style="margin-top:6px;"></div>
        </div>
      </div>

      <!-- ゾーンバー -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--tx3);font-family:'DM Mono',monospace;margin-bottom:3px;">
          <span>12:00</span><span>13:20</span><span>15:00</span><span>15:30</span>
        </div>
        <div class="zone-bar">
          <div class="zone-marker" id="arrMarker" style="left:0%;display:none;"></div>
          <div class="zone-marker" id="depMarker" style="left:100%;background:var(--cy);display:none;"></div>
        </div>
      </div>

      <div class="fsec">
        <label class="lbl">メモ（任意）</label>
        <input class="inp" type="text" id="attMemo" placeholder="特記事項など">
      </div>

      <div style="display:flex;gap:8px;">
        <button class="btn bgh bfl" onclick="resetTimeInput()">リセット</button>
        <button class="btn bpr bfl" onclick="saveAttendance()">💾 記録する</button>
      </div>
    </div>
  </div>

  <!-- 本日の記録一覧 -->
  <div id="todayRecords" style="display:none;">
    <div class="stitle">本日の記録</div>
    <div id="todayList"></div>
  </div>
</div>

<!-- ── 統計 ── -->
<div id="pnl-stats" class="pnl">
  <div class="stitle">期間フィルター</div>
  <div class="card">
    <div class="frow">
      <div class="fsec" style="margin:0;">
        <label class="lbl">開始日</label>
        <input class="inp" type="date" id="statsFrom">
      </div>
      <div class="fsec" style="margin:0;">
        <label class="lbl">終了日</label>
        <input class="inp" type="date" id="statsTo">
      </div>
    </div>
    <button class="btn bpr bfl" style="margin-top:10px;" onclick="renderStats()">集計する</button>
  </div>
  <div id="statsContent"></div>
</div>

<!-- ── コーチ登録 ── -->
<div id="pnl-coaches" class="pnl">
  <div class="stitle">新規コーチ登録</div>
  <div class="card">
    <div class="frow" style="margin-bottom:12px;">
      <div class="fsec" style="margin:0;">
        <label class="lbl">氏名 *</label>
        <input class="inp" type="text" id="newCoachName" placeholder="例: 山田 太郎">
      </div>
      <div class="fsec" style="margin:0;">
        <label class="lbl">よみがな</label>
        <input class="inp" type="text" id="newCoachFuri" placeholder="例: やまだ たろう">
      </div>
    </div>
    <div class="fsec">
      <label class="lbl">基本謝礼額（¥/回）</label>
      <input class="inp" type="number" id="newCoachFee" placeholder="例: 2000" min="0" step="500">
    </div>
    <button class="btn bpr bfl" onclick="addCoach()">➕ 登録</button>
  </div>
  <div class="stitle">登録済みコーチ</div>
  <div id="coachList"><div class="ld"><div class="spin"></div></div></div>
</div>

</div>

<!-- EDIT MODAL -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:20px;width:100%;max-width:460px;">
    <div style="font-weight:700;font-size:1rem;color:var(--or);margin-bottom:14px;">コーチ情報を編集</div>
    <input type="hidden" id="editCoachId">
    <div class="fsec">
      <label class="lbl">氏名 *</label>
      <input class="inp" type="text" id="editCoachName">
    </div>
    <div class="fsec">
      <label class="lbl">よみがな</label>
      <input class="inp" type="text" id="editCoachFuri">
    </div>
    <div class="fsec">
      <label class="lbl">基本謝礼額（¥/回）</label>
      <input class="inp" type="number" id="editCoachFee" min="0" step="500">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn bgh bfl" onclick="closeEditModal()">キャンセル</button>
      <button class="btn bpr bfl" onclick="saveEditCoach()">💾 保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbyVH4yXtC0PsG4gwbWITAnsMFUdwvMSij2hNsZ9z4bfRTRS0RxHzqvZZeaN3AVIEOte/exec';


// 時間帯定義
const TIME_START=720; // 12:00 (分)
const TIME_END=930;   // 15:30
const PREP_END=800;   // 13:20
const ACT_START=810;  // 13:30
const ACT_END=900;    // 15:00

let COACHES=[];
let ATTENDANCE=[];

// ── INIT ──
async function init(){
  await loadData();
  buildTimeSels();
  document.getElementById('actDate').valueAsDate=new Date();
  // 統計の初期期間（今月）
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  document.getElementById('statsFrom').value=`${y}-${String(m+1).padStart(2,'0')}-01`;
  document.getElementById('statsTo').valueAsDate=now;
  renderCoachList();
  populateCoachSel();
}

// ── DATA (GASから読み込む) ──
async function loadData(){
  try {
    const [cRes, lRes] = await Promise.all([
      fetch(GAS + '?action=getCoaches'),
      fetch(GAS + '?action=getCoachLog'),
    ]);
    const [cData, lData] = await Promise.all([cRes.json(), lRes.json()]);
    if (cData.coaches) COACHES = cData.coaches.map(c => ({
      ...c, baseFee: parseInt(c.baseFee) || 0
    }));
    if (lData.logs) ATTENDANCE = lData.logs.map(l => ({
      ...l,
      arrival: parseInt(l.arrival) || 0,
      departure: l.departure ? parseInt(l.departure) : null,
      isPrepTime: l.isPrepTime === 'true' || l.isPrepTime === true,
      isFullDay: l.isFullDay === 'true' || l.isFullDay === true,
    }));
  } catch(e) { console.error('Load error:', e); }
}

// ── TIME SELECTS (5分刻み 12:00〜15:30) ──
function buildTimeSels(){
  const opts=['<option value="">選択</option>'];
  const dOpts=['<option value="">選択（任意）</option>'];
  for(let t=TIME_START;t<=TIME_END;t+=5){
    const h=Math.floor(t/60),m=t%60;
    const label=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    opts.push(`<option value="${t}">${label}</option>`);
    dOpts.push(`<option value="${t}">${label}</option>`);
  }
  document.getElementById('arrivalSel').innerHTML=opts.join('');
  document.getElementById('departureSel').innerHTML=dOpts.join('');
}

function getZoneLabel(min){
  min=parseInt(min);
  if(min<=PREP_END) return {label:'🔴 準備帯',cls:'tz-prep'};
  if(min<ACT_END)   return {label:'🟡 活動帯',cls:'tz-act'};
  return {label:'🔵 撤去帯',cls:'tz-rem'};
}

function minToStr(min){
  if(!min&&min!==0) return '—';
  min=parseInt(min);
  const h=Math.floor(min/60),m=min%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function timeToPercent(min){
  min=parseInt(min);
  return Math.max(0,Math.min(100,((min-TIME_START)/(TIME_END-TIME_START))*100));
}

function updateZone(){
  const arr=document.getElementById('arrivalSel').value;
  const dep=document.getElementById('departureSel').value;

  const az=document.getElementById('arrZone');
  const dz=document.getElementById('depZone');
  const am=document.getElementById('arrMarker');
  const dm=document.getElementById('depMarker');

  if(arr){
    const z=getZoneLabel(arr);
    az.innerHTML=`<span class="${z.cls}">${z.label}</span>`;
    am.style.display='';
    am.style.left=timeToPercent(arr)+'%';
  } else {
    az.innerHTML=''; am.style.display='none';
  }
  if(dep){
    const z=getZoneLabel(dep);
    dz.innerHTML=`<span class="${z.cls}">${z.label}</span>`;
    dm.style.display='';
    dm.style.left=timeToPercent(dep)+'%';
  } else {
    dz.innerHTML=''; dm.style.display='none';
  }
}

// ── COACH SELECT ──
function populateCoachSel(){
  const sel=document.getElementById('coachSel');
  const cur=sel.value;
  sel.innerHTML='<option value="">選択してください</option>'+
    COACHES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  if(cur) sel.value=cur;
}

function onCoachSelect(){
  const id=document.getElementById('coachSel').value;
  const area=document.getElementById('timeInputArea');
  if(!id){area.style.display='none';return;}
  const c=COACHES.find(x=>x.id===id);
  if(!c)return;
  document.getElementById('selCoachName').innerHTML=
    `<div class="coach-avtr" style="width:32px;height:32px;font-size:.9rem;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--rd));color:#fff;font-family:'Oswald',sans-serif;font-weight:700;margin-right:8px;">${c.name[0]}</div>${c.name}`;
  area.style.display='';
  resetTimeInput();
  renderTodayRecords();
}

function resetTimeInput(){
  document.getElementById('arrivalSel').value='';
  document.getElementById('departureSel').value='';
  document.getElementById('attMemo').value='';
  updateZone();
}

// ── SAVE ATTENDANCE ──
async function saveAttendance(){
  const date=document.getElementById('actDate').value;
  const coachId=document.getElementById('coachSel').value;
  const arr=document.getElementById('arrivalSel').value;
  const dep=document.getElementById('departureSel').value;
  const memo=document.getElementById('attMemo').value.trim();

  if(!date){showT('⚠ 活動日を選択してください',true);return;}
  if(!coachId){showT('⚠ コーチを選択してください',true);return;}
  if(!arr){showT('⚠ 到着時刻を選択してください',true);return;}

  const coach=COACHES.find(c=>c.id===coachId);
  const dateStr=date.replace(/-/g,'/');

  // 同日同コーチの重複確認
  const dup=ATTENDANCE.find(a=>a.date===dateStr&&a.coachId===coachId);
  if(dup){
    if(!confirm(`${coach.name}さんの${dateStr}の記録が既にあります。上書きしますか？`))return;
    const idx=ATTENDANCE.indexOf(dup);
    ATTENDANCE.splice(idx,1);
  }

  const isFullDay=dep&&parseInt(dep)>=ACT_END; // 15:00以降まで参加
  const isPrepTime=parseInt(arr)<=PREP_END;     // 準備帯に到着

  try {
    const res = await fetch(GAS, { method: 'POST', body: JSON.stringify({
      action: 'saveCoachLog',
      coachId, coachName: coach.name,
      date: dateStr,
      arrival: parseInt(arr),
      departure: dep ? parseInt(dep) : '',
      memo, isFullDay, isPrepTime,
      arrZone: getZoneLabel(arr).label,
    })});
    const d = await res.json();
    if (d.status === 'ok') {
      await loadData();
      showT(`✓ ${coach.name}さんの記録を保存しました`);
      resetTimeInput();
      renderTodayRecords();
    } else throw new Error(d.message);
  } catch(e) { showT('⚠ 保存失敗: ' + e.message, true); }
}

// ── TODAY RECORDS ──
function renderTodayRecords(){
  const date=document.getElementById('actDate').value.replace(/-/g,'/');
  const recs=ATTENDANCE.filter(a=>a.date===date).sort((a,b)=>a.arrival-b.arrival);
  const el=document.getElementById('todayRecords');
  const list=document.getElementById('todayList');
  if(!recs.length){el.style.display='none';return;}
  el.style.display='';
  list.innerHTML=recs.map(a=>{
    const arr=minToStr(a.arrival),dep=a.departure?minToStr(a.departure):'未退館';
    const az=getZoneLabel(a.arrival);
    return `<div class="att-row">
      <div class="att-coach-name">
        ${a.coachName}
        ${a.isPrepTime?'<span class="tz-prep" style="font-size:.65rem;">準備参加</span>':''}
        ${a.isFullDay?'<span class="tz-rem" style="font-size:.65rem;">最後まで</span>':''}
      </div>
      <div class="att-times">
        <div>
          <div class="att-time-lbl">到着</div>
          <div class="att-time-val">${arr}</div>
          <div class="att-zone"><span class="${az.cls}" style="font-size:.65rem;">${az.label}</span></div>
        </div>
        <div>
          <div class="att-time-lbl">退館</div>
          <div class="att-time-val" style="color:var(--cy);">${dep}</div>
        </div>
      </div>
      ${a.memo?`<div style="font-size:.75rem;color:var(--tx2);margin-top:6px;">💬 ${a.memo}</div>`:''}
      <div style="margin-top:8px;text-align:right;">
        <button class="btn bdng bsm" onclick="delAtt('${a.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

async function delAtt(id){
  if(!confirm('この記録を削除しますか？'))return;
  try {
    await fetch(GAS, { method: 'POST', body: JSON.stringify({ action: 'deleteCoachLog', id }) });
    await loadData();
    renderTodayRecords();
    showT('削除しました');
  } catch(e) { showT('削除失敗', true); }
}

// ── STATS ──
function renderStats(){
  const from=document.getElementById('statsFrom').value.replace(/-/g,'/');
  const to=document.getElementById('statsTo').value.replace(/-/g,'/');
  const recs=ATTENDANCE.filter(a=>a.date>=from&&a.date<=to);
  const el=document.getElementById('statsContent');

  if(!recs.length){
    el.innerHTML='<div style="text-align:center;padding:32px;color:var(--tx3);">この期間の記録がありません</div>';
    return;
  }

  // コーチごとに集計
  const byCoach={};
  recs.forEach(a=>{
    if(!byCoach[a.coachId]) byCoach[a.coachId]={name:a.coachName,recs:[]};
    byCoach[a.coachId].recs.push(a);
  });

  const rows=Object.values(byCoach).map(c=>{
    const n=c.recs.length;
    const prepCount=c.recs.filter(r=>r.isPrepTime).length;
    const fullCount=c.recs.filter(r=>r.isFullDay).length;
    const avgArr=Math.round(c.recs.reduce((s,r)=>s+r.arrival,0)/n);
    const early=c.recs.filter(r=>r.arrival<=720).length; // 12:00ちょうど
    const coach=COACHES.find(x=>x.name===c.name);
    const baseFee=coach?(coach.baseFee||0):0;
    return {name:c.name,n,prepCount,fullCount,avgArr,early,baseFee,recs:c.recs};
  }).sort((a,b)=>b.prepCount-a.prepCount||b.n-a.n);

  el.innerHTML=`
    <div class="stitle">コーチ別集計（${from}〜${to}）</div>
    ${rows.map(r=>`
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div class="coach-avtr">${r.name[0]}</div>
          <div>
            <div style="font-weight:700;font-size:.95rem;">${r.name}</div>
            <div style="font-size:.72rem;color:var(--tx2);">${from}〜${to}</div>
            ${r.baseFee ? `<div style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gd);">基本謝礼 ¥${r.baseFee.toLocaleString()}/回</div>` : ''}
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-c"><div class="stat-v or">${r.n}</div><div class="stat-l">参加回数</div></div>
          <div class="stat-c"><div class="stat-v lm">${r.prepCount}</div><div class="stat-l">準備帯参加</div></div>
          <div class="stat-c"><div class="stat-v tl">${r.fullCount}</div><div class="stat-l">最後まで</div></div>
          <div class="stat-c"><div class="stat-v cy">${minToStr(r.avgArr)}</div><div class="stat-l">平均到着</div></div>
          <div class="stat-c"><div class="stat-v gd">${Math.round(r.prepCount/r.n*100)}%</div><div class="stat-l">準備参加率</div></div>
        </div>
        <div class="stitle" style="margin-top:4px;">個別記録</div>
        <div class="htbl-wrap"><table class="htbl">
          <thead><tr><th>日付</th><th>到着</th><th>退館</th><th>区分</th><th>メモ</th></tr></thead>
          <tbody>${r.recs.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`
            <tr>
              <td style="font-family:'DM Mono',monospace;font-size:.78rem;">${a.date}</td>
              <td class="td-time" style="color:var(--or);">${minToStr(a.arrival)}</td>
              <td class="td-time" style="color:var(--cy);">${a.departure?minToStr(a.departure):'—'}</td>
              <td>
                ${a.isPrepTime?'<span class="td-early">準備参加</span>':''}
                ${a.isFullDay?'<span class="td-full">最後まで</span>':''}
                ${!a.isPrepTime&&!a.isFullDay?'<span style="color:var(--tx3);font-size:.72rem;">活動帯</span>':''}
              </td>
              <td style="font-size:.75rem;color:var(--tx2);">${a.memo||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`).join('')}`;
}

// ── COACH REGISTER ──
async function addCoach(){
  const name=document.getElementById('newCoachName').value.trim();
  const furi=document.getElementById('newCoachFuri').value.trim();
  if(!name){showT('⚠ 氏名を入力してください',true);return;}
  if(COACHES.find(c=>c.name===name)){showT('⚠ 同じ名前のコーチが既に登録されています',true);return;}
  const fee = parseInt(document.getElementById('newCoachFee').value) || 0;
  try {
    const res = await fetch(GAS, { method: 'POST', body: JSON.stringify({
      action: 'saveCoach', name, furigana: furi, baseFee: fee
    })});
    const d = await res.json();
    if (d.status === 'ok') {
      await loadData();
      document.getElementById('newCoachName').value='';
      document.getElementById('newCoachFuri').value='';
      document.getElementById('newCoachFee').value='';
      renderCoachList();
      populateCoachSel();
      showT(`✓ ${name}さんを登録しました`);
    } else throw new Error(d.message);
  } catch(e) { showT('⚠ 登録失敗: ' + e.message, true); }
}

function renderCoachList(){
  const el=document.getElementById('coachList');
  if(!COACHES.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--tx3);">コーチが登録されていません</div>';
    return;
  }
  el.innerHTML=COACHES.map(c=>`
    <div class="coach-card">
      <div class="coach-avtr">${c.name[0]}</div>
      <div style="flex:1;">
        <div class="coach-nm">${c.name}</div>
        <div class="coach-furi">${c.furigana||'—'}</div>
        ${c.baseFee ? `<div style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gd);margin-top:2px;">¥${c.baseFee.toLocaleString()}/回</div>` : '<div style="font-size:.7rem;color:var(--tx3);margin-top:2px;">謝礼未設定</div>'}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="bsm btn bgh" onclick="openEditModal('${c.id}')">編集</button>
        <button class="coach-del" onclick="delCoach('${c.id}')">削除</button>
      </div>
    </div>`).join('');
}

async function delCoach(id){
  const c=COACHES.find(x=>x.id===id);
  if(!confirm(`${c?.name}を削除しますか？`))return;
  try {
    await fetch(GAS, { method: 'POST', body: JSON.stringify({ action: 'deleteCoach', id }) });
    await loadData();
    renderCoachList();
    populateCoachSel();
    showT('削除しました');
  } catch(e) { showT('削除失敗', true); }
}

// ── TABS ──
function sw(name,btn){
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pnl-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='stats')renderStats();
  if(name==='coaches')renderCoachList();
}

function showT(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=err?'var(--rd)':'var(--or)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

init();

function openEditModal(id) {
  const c = COACHES.find(x => x.id === id);
  if (!c) return;
  document.getElementById('editCoachId').value = c.id;
  document.getElementById('editCoachName').value = c.name;
  document.getElementById('editCoachFuri').value = c.furigana || '';
  document.getElementById('editCoachFee').value = c.baseFee || '';
  document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveEditCoach() {
  const id = document.getElementById('editCoachId').value;
  const name = document.getElementById('editCoachName').value.trim();
  if (!name) { showT('⚠ 氏名を入力してください', true); return; }
  const idx = COACHES.findIndex(c => c.id === id);
  if (idx === -1) return;
  try {
    const res = await fetch(GAS, { method: 'POST', body: JSON.stringify({
      action: 'saveCoach', id,
      name,
      furigana: document.getElementById('editCoachFuri').value.trim(),
      baseFee: parseInt(document.getElementById('editCoachFee').value) || 0,
    })});
    const d = await res.json();
    if (d.status === 'ok') {
      await loadData();
      renderCoachList();
      populateCoachSel();
      closeEditModal();
      showT('✓ 更新しました');
    } else throw new Error(d.message);
  } catch(e) { showT('⚠ 更新失敗: ' + e.message, true); }
}



// ── AUTH ──
const AUTH_KEY = 'ac_auth';
const AUTH_PASS = '1223';

function checkAuth() {
  const v = document.getElementById('authInput').value;
  if (v === AUTH_PASS) {
    sessionStorage.setItem(AUTH_KEY, '1');
    document.getElementById('authOverlay').style.display = 'none';
  } else {
    document.getElementById('authErr').style.display = 'block';
    document.getElementById('authInput').value = '';
    document.getElementById('authInput').focus();
  }
}

// 認証チェック
if (!sessionStorage.getItem(AUTH_KEY)) {
  // オーバーレイを表示（すでにHTML内にある）
  document.getElementById('authInput').focus();
} else {
  document.getElementById('authOverlay').style.display = 'none';
}

</script>
